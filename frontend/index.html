<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/ohmaishoot-logo.png" />
  <link rel="apple-touch-icon" href="/ohmaishoot-logo.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="alternate" type="application/rss+xml" title="MarathonHub Blog" href="/blog/rss.xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="wmMsJ1suvubxtCMxWQHcUH_6TsmURnSRZffEwlyE_vY" />

  <!-- Bing Webmaster Tools verification (also covers ChatGPT search via Bing index) -->
  <meta name="msvalidate.01" content="F7521108A0F2956C5024BA4691D879C0" />

  <!-- Canonical URL — homepage. Event/photographer pages override server-side. -->
  <link rel="canonical" href="https://marathonhub.ohmaishoot.com/" />

  <!-- Primary Meta Tags -->
  <title>Official Marathon &amp; Running Event Photos Malaysia | MarathonHub</title>
  <meta name="title" content="Official Marathon &amp; Running Event Photos Malaysia | MarathonHub" />
  <meta name="description"
    content="Search and download official marathon, fun run, cycling, and running event photos across Malaysia. Free face-search, 40+ official race photographers." />
  <meta name="keywords" content="marathon photos malaysia, running event photos malaysia, official race photos, race photo search malaysia, marathon photographer malaysia, fun run photos, cycling event photos, marathonhub" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MarathonHub" />
  <meta property="og:locale" content="ms_MY" />
  <meta property="og:url" content="https://marathonhub.ohmaishoot.com/" />
  <meta property="og:title" content="Official Marathon &amp; Running Event Photos Malaysia | MarathonHub" />
  <meta property="og:description"
    content="Search and download official marathon, fun run, cycling, and running event photos across Malaysia. Free face-search, 40+ official race photographers." />
  <meta property="og:image" content="https://marathonhub.ohmaishoot.com/og-image.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://marathonhub.ohmaishoot.com/" />
  <meta property="twitter:title" content="Official Marathon &amp; Running Event Photos Malaysia | MarathonHub" />
  <meta property="twitter:description"
    content="Search and download official marathon, fun run, cycling, and running event photos across Malaysia. Free face-search, 40+ official race photographers." />
  <meta property="twitter:image" content="https://marathonhub.ohmaishoot.com/og-image.jpg" />

  <!-- JSON-LD: Organization + WebSite/SearchAction.
       Inline so non-JS crawlers (Googlebot fallback, AI bots) see it on first paint. -->
  <script defer src="/umami/script.js" data-website-id="5fcd68bc-fa9a-455b-b603-b77146158073"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://marathonhub.ohmaishoot.com/#organization",
        "name": "MarathonHub",
        "alternateName": "MarathonHub by OhMaiShoot",
        "url": "https://marathonhub.ohmaishoot.com/",
        "logo": "https://marathonhub.ohmaishoot.com/ohmaishoot-logo.png",
        "description": "Official directory of marathon, running, and cycling event photography in Malaysia. Operated by OhMaiShoot.",
        "areaServed": { "@type": "Country", "name": "Malaysia" },
        "sameAs": ["https://ohmaishoot.com/"],
        "parentOrganization": { "@type": "Organization", "name": "OhMaiShoot" }
      },
      {
        "@type": "WebSite",
        "@id": "https://marathonhub.ohmaishoot.com/#website",
        "url": "https://marathonhub.ohmaishoot.com/",
        "name": "MarathonHub",
        "publisher": { "@id": "https://marathonhub.ohmaishoot.com/#organization" },
        "inLanguage": ["en-MY", "ms-MY"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://marathonhub.ohmaishoot.com/events?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
